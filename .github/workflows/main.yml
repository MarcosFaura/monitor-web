name: Monitor Web Automatico

on:
  schedule:
    - cron: '0 * * * *' # Esto le dice: "Ejecútate cada hora en punto"
  workflow_dispatch: # Esto te permite darle al botón de "Play" a mano cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar mi codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerias
        run: pip install requests

      - name: Ejecutar el monitor
        run: python monitor.py
